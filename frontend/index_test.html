<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>服装检测系统</title>
</head>
<body>
    <h1>服装检测系统</h1>
    <input type="file" id="fileInput" onchange="showFileName()">
    <p id="result" ></p>
    <button onclick="showFileName()">显示文件名</button>
    <script>
        function showFileName() {
            const fileInput = document.getElementById('fileInput')
            const file = fileInput.files[0];
            if (!file)  {
                document.getElementById("result").innerText = "你还没有选择图片";
                return 0 ;
            }
            document.getElementById("result").innerText = file.name;
            const formData = new FormData();
            formData.append("file", file);
            fetch("http://127.0.0.1:8000/upload_test", {
                        method: "POST",
                        body: formData
                    })
                    .then(res => {
                        console.log("res:", res);
                        return res.json();
                    })
                    .then(data => {
                        console.log("data:", data);
                    });
        }
    </script>
</body>
</html>
